<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tạo link Shopee</title>

<style>
body {
  font-family: Arial;
  background: #fff5f2;
  padding: 20px;
}

.container {
  max-width: 420px;
  margin: auto;
}

.card {
  background: white;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.05);
}

.title {
  color: #ee4d2d;
  font-size: 22px;
  font-weight: bold;
}

.input-box {
  display: flex;
  margin-top: 15px;
  border: 2px solid #ee4d2d;
  border-radius: 12px;
  overflow: hidden;
}

.input-box input {
  flex: 1;
  border: none;
  padding: 12px;
}

.input-box button {
  background: #ee4d2d;
  color: white;
  border: none;
  padding: 12px 16px;
}

.result {
  margin-top: 15px;
  word-break: break-all;
  color: green;
}

.copy-btn {
  margin-top: 10px;
  background: #4caf50;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
}

.guide {
  margin-top: 25px;
  background: white;
  padding: 15px;
  border-radius: 12px;
}

/* ===== VOUCHER ===== */
.voucher-box {
  display: flex; /* 🔥 HIỆN LUÔN */
  align-items: center;
  background: #fff;
  border-radius: 12px;
  margin-top: 15px;
  padding: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.voucher-left {
  background: #ff5722;
  padding: 12px;
  border-radius: 10px;
}

.circle {
  width: 30px;
  height: 30px;
  background: #1877f2;
  color: #fff;
  font-weight: bold;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.voucher-content {
  flex: 1;
  margin-left: 10px;
}

.voucher-title {
  font-weight: bold;
  color: #ff5722;
}

.voucher-desc {
  font-size: 13px;
}

.tag {
  display: inline-block;
  font-size: 12px;
  color: #ff5722;
  border: 1px solid #ff5722;
  padding: 2px 6px;
  border-radius: 6px;
  margin-top: 3px;
}

.progress {
  height: 4px;
  background: #eee;
  margin: 5px 0;
  border-radius: 4px;
}

.bar {
  width: 93%;
  height: 100%;
  background: orange;
  border-radius: 4px;
}

.btn-use {
  background: #ee4d2d;
  color: #fff;
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <div class="title">🔥 Tạo link Shopee</div>
    <p>Dán link sản phẩm để lấy link ưu đãi</p>

    <div class="input-box">
      <input id="linkInput" placeholder="Dán link Shopee...">
      <button onclick="taoLink()">Tạo</button>
    </div>

    <div id="result" class="result"></div>
    <button class="copy-btn" onclick="copyLink()">Copy link</button>

    <!-- ✅ VOUCHER HIỆN LUÔN -->
    <div class="voucher-box">
      <div class="voucher-left">
        <div class="circle">f</div>
      </div>

      <div class="voucher-content">
        <div class="voucher-title">Giảm 25% - Tối đa 1tr</div>
        <div class="voucher-desc">Đơn tối thiểu 50k</div>
        <div class="tag">Độc quyền Facebook</div>

        <div class="progress">
          <div class="bar"></div>
        </div>

        <small>Đã dùng 93% • Sắp hết</small>
      </div>

      <button class="btn-use" onclick="openLink()">Dùng ngay</button>
    </div>

  </div>

  <div class="guide">
    <b>Hướng dẫn:</b>
    <p>1. Dán link sản phẩm</p>
    <p>2. Tạo link</p>
    <p>3. Copy link</p>
    <p>4. Đăng Facebook/TikTok</p>
  </div>
</div>

<script>
let currentLink = "";

// ⚠️ THAY ID CỦA BẠN
const AFF_ID = "17300990486";

function taoLink() {
  let link = document.getElementById("linkInput").value;

  if (!link) {
    alert("Nhập link!");
    return;
  }

  if (link.includes("?")) {
    currentLink = link + "&af_siteid=" + AFF_ID;
  } else {
    currentLink = link + "?af_siteid=" + AFF_ID;
  }

  document.getElementById("result").innerHTML =
    "Link của bạn:<br><b>" + currentLink + "</b>";
}

function copyLink() {
  if (!currentLink) return alert("Chưa có link!");

  navigator.clipboard.writeText(currentLink);
  alert("Đã copy!");
}

function openLink() {
  if (!currentLink) {
    alert("Chưa có link!");
    return;
  }
  window.open(currentLink, "_blank");
}
</script>

</body>
</html>
