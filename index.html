<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tạo link Shopee</title>

<style>
body {
  font-family: Arial;
  background: #fff5f2;
  padding: 20px;
}

.container {
  max-width: 420px;
  margin: auto;
}

.card {
  background: white;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.05);
}

.title {
  color: #ee4d2d;
  font-size: 22px;
  font-weight: bold;
}

.input-box {
  display: flex;
  margin-top: 15px;
  border: 2px solid #ee4d2d;
  border-radius: 12px;
  overflow: hidden;
}

.input-box input {
  flex: 1;
  border: none;
  padding: 12px;
}

.input-box button {
  background: #ee4d2d;
  color: white;
  border: none;
  padding: 12px 16px;
}

.copy-btn {
  margin-top: 10px;
  background: #4caf50;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
}

/* ===== VOUCHER ===== */
.voucher {
  display: flex;
  align-items: center;
  background: #fff;
  margin-top: 12px;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.v-left {
  width: 70px;
  background: #ff5722;
  display: flex;
  align-items: center;
  justify-content: center;
}

.fb-icon {
  width: 36px;
  height: 36px;
  background: #1877f2;
  color: #fff;
  font-weight: bold;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.v-content {
  flex: 1;
  padding: 10px;
}

.v-title {
  font-weight: bold;
  color: #ff5722;
}

.v-sub {
  font-size: 13px;
}

.v-tag {
  display: inline-block;
  font-size: 11px;
  border: 1px solid #ff5722;
  color: #ff5722;
  padding: 2px 6px;
  border-radius: 6px;
  margin-top: 4px;
}

.progress {
  height: 4px;
  background: #eee;
  margin: 6px 0;
  border-radius: 4px;
}

.bar {
  height: 100%;
  background: orange;
  border-radius: 4px;
}

.v-footer {
  font-size: 11px;
  color: #777;
}

.v-btn {
  margin-right: 10px;
  background: #fff;
  border: 1px solid #ff5722;
  color: #ff5722;
  padding: 6px 10px;
  border-radius: 8px;
}

/* guide */
.guide {
  margin-top: 25px;
  background: white;
  padding: 15px;
  border-radius: 12px;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <div class="title">🔥 Tạo link Shopee</div>

    <div class="input-box">
      <input id="linkInput" placeholder="Dán link Shopee...">
      <button onclick="taoLink()">Tạo</button>
    </div>

    <button class="copy-btn" onclick="copyLink()">Copy link</button>

    <!-- 🔥 DANH SÁCH VOUCHER -->
    <div id="voucherList"></div>

  </div>

  <div class="guide">
    <b>Hướng dẫn:</b>
    <p>1. Dán link sản phẩm</p>
    <p>2. Tạo link</p>
    <p>3. Copy link</p>
    <p>4. Đăng Facebook/TikTok</p>
  </div>
</div>

<script>
let currentLink = "";
const AFF_ID = "17300990486";

// 🎲 random voucher
function randomVoucher() {
  let percent = [10,15,20,25,30,40,50];
  let p = percent[Math.floor(Math.random()*percent.length)];
  let used = Math.floor(Math.random()*30)+70;

  return {
    title: "Giảm " + p + "% - Tối đa 1tr",
    used: used
  };
}

// 🔥 tạo danh sách voucher
function renderVoucher() {
  let html = "";

  for (let i=0;i<2;i++) {
    let v = randomVoucher();

    html += `
    <div class="voucher">
      <div class="v-left">
        <div class="fb-icon">f</div>
      </div>

      <div class="v-content">
        <div class="v-title">${v.title}</div>
        <div class="v-sub">Đơn tối thiểu 50k</div>
        <div class="v-tag">Độc quyền Facebook</div>

        <div class="progress">
          <div class="bar" style="width:${v.used}%"></div>
        </div>

        <div class="v-footer">Đã dùng ${v.used}% • Sắp hết</div>
      </div>

      <button class="v-btn" onclick="openLink()">Dùng ngay</button>
    </div>
    `;
  }

  document.getElementById("voucherList").innerHTML = html;
}

// chạy ngay khi vào trang
renderVoucher();

function taoLink() {
  let link = document.getElementById("linkInput").value;

  if (!link) return alert("Nhập link!");

  if (link.includes("?")) {
    currentLink = link + "&af_siteid=" + AFF_ID;
  } else {
    currentLink = link + "?af_siteid=" + AFF_ID;
  }

  alert("Đã tạo link!");
}

function copyLink() {
  if (!currentLink) return alert("Chưa có link!");
  navigator.clipboard.writeText(currentLink);
  alert("Đã copy!");
}

function openLink() {
  if (!currentLink) {
    alert("Bạn chưa tạo link!");
    return;
  }
  window.open(currentLink, "_blank");
}
</script>

</body>
</html>
