<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tạo link Shopee</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fff5f2;
  padding: 0;
}

/* 🔥 Logo Shopee góc trên bên trái */
.logo-shopee {
  position: fixed;
  top: 10px;
  left: 10px;
  width: 50px;
  height: 50px;
  z-index: 1000;
}

/* Container chính */
.container {
  max-width: 420px;
  margin: 80px auto 20px auto; /* đẩy xuống để không chèn logo */
  padding: 0 15px;
}

.card {
  background: white;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.05);
}

.title {
  color: #ee4d2d;
  font-size: 22px;
  font-weight: bold;
}

.input-box {
  display: flex;
  margin-top: 15px;
  border: 2px solid #ee4d2d;
  border-radius: 12px;
  overflow: hidden;
}

.input-box input {
  flex: 1;
  border: none;
  padding: 12px;
  font-size: 14px;
}

.input-box button {
  background: #ee4d2d;
  color: white;
  border: none;
  padding: 12px 16px;
  font-size: 14px;
  cursor: pointer;
}

.copy-btn {
  margin-top: 10px;
  background: #4caf50;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
  width: 100%;
  cursor: pointer;
}

/* Voucher */
.voucher {
  display: flex;
  align-items: center;
  background: white;
  margin-top: 15px;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.v-left {
  width: 70px;
  background: #ff5722;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px 0;
}

.fb-icon {
  width: 36px;
  height: 36px;
  background: #1877f2;
  color: white;
  font-weight: bold;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
}

.v-content {
  flex: 1;
  padding: 10px;
}

.v-title {
  font-weight: bold;
  color: #ff5722;
}

.v-sub {
  font-size: 13px;
  margin-top: 2px;
}

.v-tag {
  display: inline-block;
  font-size: 11px;
  border: 1px solid #ff5722;
  color: #ff5722;
  padding: 2px 6px;
  border-radius: 6px;
  margin-top: 4px;
}

.progress {
  height: 4px;
  background: #eee;
  margin: 6px 0;
  border-radius: 4px;
  overflow: hidden;
}

.bar {
  height: 100%;
  background: orange;
  border-radius: 4px;
}

.v-footer {
  font-size: 11px;
  color: #777;
}

.v-btn {
  margin: 0 10px;
  background: #ee4d2d;
  border: none;
  color: white;
  padding: 6px 10px;
  border-radius: 8px;
  cursor: pointer;
}

/* Hướng dẫn */
.guide {
  margin-top: 25px;
  background: white;
  padding: 15px;
  border-radius: 12px;
}
</style>
</head>
<body>

<!-- Logo Shopee -->
<img class="logo-shopee" src="https://upload.wikimedia.org/wikipedia/vi/2/2f/Shopee_logo.png" alt="Shopee Logo">

<div class="container">
  <div class="card">
    <div class="title">🔥 Tạo link Shopee</div>

    <div class="input-box">
      <input id="linkInput" placeholder="Dán link Shopee...">
      <button onclick="taoLink()">Tạo</button>
    </div>

    <button class="copy-btn" onclick="copyLink()">Copy link</button>

    <!-- Danh sách voucher -->
    <div id="voucherList"></div>

  </div>

  <div class="guide">
    <b>Hướng dẫn:</b>
    <p>1. Dán link sản phẩm</p>
    <p>2. Tạo link</p>
    <p>3. Copy link</p>
    <p>4. Đăng Facebook/TikTok</p>
  </div>
</div>

<script>
let currentLink = "";
const AFF_ID = "17300990486";

// Tạo voucher random
function randomVoucher() {
  const percent = [10,15,20,25,30,40,50];
  const p = percent[Math.floor(Math.random()*percent.length)];
  const used = Math.floor(Math.random()*30)+70;
  return {title:"Giảm "+p+"% - Tối đa 1tr", used:used};
}

// Render voucher
function renderVoucher() {
  let html = "";
  for(let i=0;i<3;i++){ // 3 voucher giống hình
    const v = randomVoucher();
    html += `
    <div class="voucher">
      <div class="v-left">
        <div class="fb-icon">f</div>
      </div>
      <div class="v-content">
        <div class="v-title">${v.title}</div>
        <div class="v-sub">Đơn tối thiểu 50k</div>
        <div class="v-tag">Độc quyền Facebook</div>
        <div class="progress"><div class="bar" style="width:${v.used}%"></div></div>
        <div class="v-footer">Đã dùng ${v.used}% • Sắp hết</div>
      </div>
      <button class="v-btn" onclick="openLink()">Dùng ngay</button>
    </div>
    `;
  }
  document.getElementById("voucherList").innerHTML = html;
}

// Hiện voucher ngay khi load
renderVoucher();

function taoLink() {
  const link = document.getElementById("linkInput").value;
  if(!link){alert("Nhập link!"); return;}
  currentLink = link.includes("?") ? link+"&af_siteid="+AFF_ID : link+"?af_siteid="+AFF_ID;
  alert("Đã tạo link!");
}

function copyLink() {
  if(!currentLink){alert("Chưa có link!"); return;}
  navigator.clipboard.writeText(currentLink);
  alert("Đã copy!");
}

function openLink() {
  if(!currentLink){alert("Bạn chưa tạo link!"); return;}
  window.open(currentLink,"_blank");
}
</script>
</body>
</html>
